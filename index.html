<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fintech - Acesso</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

  <header
    class="h-20 bg-zinc-950 border-b border-zinc-800 flex items-center px-6">
    
    <div class="text-zinc-400 text-3xl font-bold">
        FINTECH
    </div>

</header>

 <main
class="flex-1 flex flex-col lg:flex-row justify-center items-center gap-10 px-5 py-10 max-w-[1440px] mx-auto w-full">
    
    <section
class="bg-zinc-900 rounded-[10px] p-10 w-full max-w-[552px] min-h-[650px] flex flex-col">
      <h2 class="text-[32px] font-normal mb-2">
  Acesse sua conta
</h2>
      <p class="text-zinc-400 text-sm mb-8">Informe seus dados para continuar</p>

      <form class="flex flex-col gap-5">
        <div class="flex flex-col gap-2">
          <label
  for="email"
  class="text-zinc-500 text-sm">
  E-mail *
</label>
          <input
  type="email"
  id="email"
  required
  placeholder="Seu e-mail"
  class="w-full bg-zinc-900 border border-zinc-700 rounded-md px-3 py-3 text-white outline-none focus:border-cyan-600">
        </div>
      
        <div class="flex flex-col gap-2">
          <label
  for="password"
  class="text-zinc-500 text-sm">
  Senha *
</label>
          <div class="relative">
            <input
  type="password"
  id="password"
  required
  placeholder="Sua senha"
  class="w-full bg-zinc-900 border border-zinc-700 rounded-md px-3 py-3 text-white outline-none focus:border-cyan-600">
            
            <span
  class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-zinc-500 cursor-pointer hover:text-zinc-400 select-none">
  visibility
</span>
          </div>
        </div>

        <button
  type="submit"
  class="w-full py-3.5 rounded-md bg-cyan-600 text-zinc-900 font-semibold hover:bg-cyan-700 transition-colors">
  ACESSAR CONTA
</button>
      </form>

      <div class="relative text-center my-6">

  <div
    class="absolute top-1/2 left-0 w-full h-px bg-zinc-700">
  </div>

  <span
    class="relative bg-zinc-900 px-4 text-zinc-500">
    ou
  </span>

</div>

<div class="social-login">
        
        <button
  class="w-full py-3.5 rounded-md border border-zinc-700 bg-zinc-900 text-zinc-400 flex items-center justify-center gap-4 hover:bg-zinc-800 transition-colors">
          <svg class="social-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.5 24c0-1.61-.15-3.16-.42-4.69H24v8.89h12.62c-.54 2.84-2.15 5.25-4.56 6.87l7.07 5.48C43.27 36.14 46.5 30.64 46.5 24z"/>
            <path fill="#FBBC05" d="M10.54 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.98-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.07-5.48c-1.96 1.32-4.47 2.1-8.82 2.1-6.26 0-11.57-4.22-13.46-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          ACESSAR COM O GOOGLE
        </button>

        <button
  class="w-full py-3.5 rounded-md border border-zinc-700 bg-zinc-900 text-zinc-400 flex items-center justify-center gap-4 mt-4 hover:bg-zinc-800 transition-colors">
          <svg class="social-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#1877F2">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
          ACESSAR COM O FACEBOOK
        </button>

      </div>
    
    </section>
    <section
class="bg-zinc-900 rounded-[10px] p-10 w-full max-w-[552px] min-h-[650px] flex flex-col">

    <div class="flex-1 flex flex-col justify-center items-center text-center">

        <span
        class="material-symbols-outlined text-cyan-600 text-4xl mb-6">
            person_add
        </span>

        <h2 class="text-[32px] font-normal mb-2">
            Novo por aqui?
        </h2>

        <p class="text-zinc-400 text-sm mb-8">
            Crie sua conta
        </p>

    </div>

    <button
    class="w-full py-3.5 rounded-md bg-cyan-600 text-zinc-900 font-semibold hover:bg-cyan-700 transition-colors">
        CRIAR CONTA
    </button>

</section>

  </main>

</body>
</html>
