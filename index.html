<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fintech - Acesso</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>

</head>
<body>

  <header
    class="h-20 bg-zinc-950 border-b border-zinc-800 flex items-center px-6">
    
    <div class="text-zinc-400 text-3xl font-bold">
        FINTECH
    </div>

</header>

  <main class="auth-container">
    
    <section class="auth-card">
      <h2>Acesse sua conta</h2>
      <p class="subtitle">Informe seus dados para continuar</p>

      <form class="auth-form">
        <div class="input-group">
          <label for="email">E-mail *</label>
          <input type="email" id="email" required placeholder="Seu e-mail">
        </div>
      
        <div class="input-group">
          <label for="password">Senha *</label>
          <div class="password-wrapper">
            <input type="password" id="password" required placeholder="Sua senha">
            
            <span class="material-symbols-outlined toggle-password-icon">visibility</span>
          </div>
        </div>

        <button type="submit" class="btn btn-primary">ACESSAR CONTA</button>
      </form>

      <div class="divider"><span>ou</span></div>

<div class="social-login">
        
        <button class="btn btn-social">
          <svg class="social-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.5 24c0-1.61-.15-3.16-.42-4.69H24v8.89h12.62c-.54 2.84-2.15 5.25-4.56 6.87l7.07 5.48C43.27 36.14 46.5 30.64 46.5 24z"/>
            <path fill="#FBBC05" d="M10.54 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.98-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.07-5.48c-1.96 1.32-4.47 2.1-8.82 2.1-6.26 0-11.57-4.22-13.46-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          ACESSAR COM O GOOGLE
        </button>

        <button class="btn btn-social">
          <svg class="social-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#1877F2">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
          ACESSAR COM O FACEBOOK
        </button>

      </div>
    
    </section>
    <section class="auth-card register-card">      
      <span class="material-symbols-outlined icon-placeholder">person_add</span>
      <h2>Novo por aqui?</h2>
      <p class="subtitle">Crie sua conta</p>
      <button class="btn btn-primary">CRIAR CONTA</button>
    </section>

  </main>

</body>
</html>
